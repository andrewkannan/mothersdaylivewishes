<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mother's Day Wishes</title>
    <!-- Google Fonts for Modern Typography -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <!-- Background elements for aesthetic depth -->
    <div class="blob shape-1"></div>
    <div class="blob shape-2"></div>
    <div class="blob shape-3"></div>

    <!-- Container for dynamic floating wishes -->
    <div id="wishes-container"></div>

    <!-- Central Input Form (Glassmorphism) -->
    <div class="center-content">
        <div class="glass-panel">
            <h1>Happy Mother's Day</h1>
            <p>Send a wish, let it flutter across the screen.</p>
            <form id="wish-form">
                <input type="text" id="wish-input" autocomplete="off" placeholder="Write your wish..." required />
                <button type="submit">✨ Send Wish</button>
            </form>
        </div>
    </div>

    <!-- Socket.io client library -->
    <script src="/socket.io/socket.io.js"></script>
    <script src="/app.js"></script>
</body>
</html>
